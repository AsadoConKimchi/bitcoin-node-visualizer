<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e2938"/>
      <stop offset="100%" stop-color="#141820"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#f7931a" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f7931a" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- 배경 원 -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- 지구본 와이어프레임 (얇은 슬레이트) -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#2dd4bf" stroke-width="2.5" opacity="0.2"/>
  <!-- 경도선 -->
  <ellipse cx="256" cy="256" rx="90" ry="180" fill="none" stroke="#2dd4bf" stroke-width="1.5" opacity="0.12"/>
  <ellipse cx="256" cy="256" rx="140" ry="180" fill="none" stroke="#2dd4bf" stroke-width="1.5" opacity="0.12"/>
  <!-- 위도선 -->
  <ellipse cx="256" cy="256" rx="180" ry="60" fill="none" stroke="#2dd4bf" stroke-width="1.5" opacity="0.12"/>
  <ellipse cx="256" cy="256" rx="180" ry="120" fill="none" stroke="#2dd4bf" stroke-width="1.5" opacity="0.12"/>
  <!-- 오렌지 글로우 -->
  <circle cx="256" cy="256" r="120" fill="url(#glow)"/>
  <!-- 비트코인 ₿ 심볼 -->
  <g fill="#f7931a">
    <!-- 세로 막대 (위) -->
    <rect x="232" y="100" width="16" height="40" rx="8"/>
    <rect x="264" y="100" width="16" height="40" rx="8"/>
    <!-- 세로 막대 (아래) -->
    <rect x="232" y="372" width="16" height="40" rx="8"/>
    <rect x="264" y="372" width="16" height="40" rx="8"/>
    <!-- B 글자 본체 -->
    <path d="
      M 208 140 h 72
      c 44 0 72 24 72 60
      c 0 24 -12 42 -32 52
      c 28 10 44 32 44 60
      c 0 40 -32 68 -80 68
      h -76
      z
      M 244 172 v 64 h 40 c 24 0 40 -12 40 -32 s -16 -32 -40 -32 z
      M 244 268 v 72 h 44 c 28 0 48 -14 48 -36 s -20 -36 -48 -36 z
    "/>
  </g>
  <!-- P2P 노드 점 (장식) -->
  <circle cx="120" cy="160" r="6" fill="#2dd4bf" opacity="0.5"/>
  <circle cx="400" cy="180" r="5" fill="#2dd4bf" opacity="0.4"/>
  <circle cx="380" cy="360" r="7" fill="#2dd4bf" opacity="0.45"/>
  <circle cx="140" cy="380" r="5" fill="#2dd4bf" opacity="0.35"/>
  <!-- 연결선 (피어 아크) -->
  <line x1="120" y1="160" x2="208" y2="200" stroke="#2dd4bf" stroke-width="1" opacity="0.2"/>
  <line x1="400" y1="180" x2="320" y2="200" stroke="#2dd4bf" stroke-width="1" opacity="0.2"/>
  <line x1="380" y1="360" x2="320" y2="320" stroke="#2dd4bf" stroke-width="1" opacity="0.15"/>
</svg>
